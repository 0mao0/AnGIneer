name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Build & deploy
        run: |
          cd ${{ github.workspace }}/docker
          docker-compose down || true
          docker-compose up -d --build --force-recreate