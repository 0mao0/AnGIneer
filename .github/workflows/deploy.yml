name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated: frontend,api-server, or all)'
        required: false
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/web-console/**'
              - 'apps/admin-console/**'
              - 'packages/ui-kit/**'
              - 'packages/docs-ui/**'
              - 'packages/sop-ui/**'
              - 'packages/evals-ui/**'
              - 'packages/geo-ui/**'
              - 'packages/engtools-ui/**'
              - 'apps/shared/**'
              - 'docker/Dockerfile.frontend'
              - 'docker/nginx/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            backend:
              - 'services/**'
              - 'apps/shared/ports.json'
              - 'docker/Dockerfile.backend'
              - 'package.json'

  build-and-deploy:
    needs: detect-changes
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Determine services
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICES="${{ github.event.inputs.services }}"
            if [ "$SERVICES" = "all" ]; then
              echo "build_frontend=true" >> $GITHUB_OUTPUT
              echo "build_backend=true" >> $GITHUB_OUTPUT
            else
              echo "build_frontend=$(echo $SERVICES | grep -q frontend && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "build_backend=$(echo $SERVICES | grep -q api-server && echo true || echo false)" >> $GITHUB_OUTPUT
            fi
          else
            echo "build_frontend=${{ needs.detect-changes.outputs.frontend_changed }}" >> $GITHUB_OUTPUT
            echo "build_backend=${{ needs.detect-changes.outputs.backend_changed }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & deploy
        run: |
          export FRONTEND_BUILD=${{ steps.targets.outputs.build_frontend }}
          export BACKEND_BUILD=${{ steps.targets.outputs.build_backend }}
          
          if [ "$FRONTEND_BUILD" = "true" ] && [ "$BACKEND_BUILD" = "true" ]; then
            docker-compose -f docker/docker-compose.yml up -d --build
          elif [ "$FRONTEND_BUILD" = "true" ]; then
            docker-compose -f docker/docker-compose.yml build frontend
            docker-compose -f docker/docker-compose.yml up -d frontend
          elif [ "$BACKEND_BUILD" = "true" ]; then
            docker-compose -f docker/docker-compose.yml build api-server
            docker-compose -f docker/docker-compose.yml up -d api-server
          else
            echo "No changes detected, skipping build"
          fi