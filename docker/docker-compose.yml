services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: angineer-frontend:latest
    container_name: angineer-frontend
    user: "1001:1001"  # ← 加这行
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - angineer-net

  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: angineer-api:latest
    container_name: angineer-api
    user: "1001:1001"  # ← 加这行
    ports:
      - "8789:8789"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped
    networks:
      - angineer-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8789/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  angineer-net:
    driver: bridge