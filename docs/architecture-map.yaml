version: 1
last_updated: 2026-05-05

truth_sources:
  - README.md
  - docs/apps-techniques.md
  - docs/services-techniques.md
  - AGENTS.md
  - package.json

readme_required_tokens:
  - apps/web-console
  - apps/admin-console
  - apps/api-server
  - packages/docs-ui
  - packages/ui-kit
  - services/ai-inference
  - services/angineer-core
  - services/sop-core
  - services/docs-core
  - services/geo-core
  - services/engtools
  - data/knowledge_base

system:
  name: AnGIneer
  repo_style: monorepo
  platforms:
    - web-console
    - admin-console
    - api-server
  default_ports:
    web_console: 3005
    admin_console: 3002
    api_server: 8789
    embedding_service: 7997
    reranker_service: 7998

modules:
  - id: web-console
    path: apps/web-console
    role: user_workbench
    depends_on:
      - docs-ui
      - ui-kit
      - api-server
    key_symbols:
      - useResourceOpen
      - workbenchStore.openResource
      - Workbench

  - id: admin-console
    path: apps/admin-console
    role: admin_workspace
    depends_on:
      - docs-ui
      - ui-kit
      - api-server
    key_symbols:
      - KnowledgeManage
      - router-view

  - id: api-server
    path: apps/api-server
    role: gateway
    depends_on:
      - ai-inference
      - docs-core
      - angineer-core
      - engtools
      - sop-core
      - geo-core
    key_symbols:
      - main.py
      - knowledge_routes.py
    exposes:
      - /api/knowledge/*
      - /api/query

  - id: docs-ui
    path: packages/docs-ui
    role: shared_ui_and_protocol
    depends_on:
      - ui-kit
    key_symbols:
      - KnowledgeTree
      - SOPTree
      - createResourceNodeFromKnowledge
      - createOpenResourcePayload

  - id: ui-kit
    path: packages/ui-kit
    role: shared_layout_and_theme
    depends_on: []
    key_symbols:
      - SmartTree
      - BaseChat
      - AIChat
      - SplitPanes
      - useTheme

  - id: ai-inference
    path: services/ai-inference
    role: ai_inference_foundation
    depends_on: []
    key_symbols:
      - llm_client.py
      - llm_config.py
      - llm_response_parser.py
      - llm_logger.py
      - semantic_embedding_service.py
      - semantic_reranker_service.py
    description: >
      AI 推理底座，零外部依赖。提供 LLM 客户端（多模型/重试/熔断/流式）、
      语义嵌入（bge-m3）、语义重排（bge-reranker-v2-m3）、响应解析。
      所有上层服务直接依赖此模块获取 AI 能力，不经过 angineer-core 中转。

  - id: docs-core
    path: services/docs-core
    role: document_parse_and_knowledge
    depends_on:
      - ai-inference
    key_symbols:
      - knowledge_service.py
      - mineru_parser.py
      - query/contracts.py
      - retrieval/dense_retriever.py
      - retrieval/hybrid_retriever.py

  - id: angineer-core
    path: services/angineer-core
    role: agent_orchestration
    depends_on:
      - ai-inference
    key_symbols:
      - core/classifier.py
      - core/dispatcher.py
      - core/memory.py
    description: >
      意图识别与调度核心。依赖 ai-inference 获取 LLM 能力，
      但不再重导出 ai-inference 的符号。

  - id: engtools
    path: services/engtools
    role: engineering_tools
    depends_on:
      - ai-inference
    key_symbols:
      - KnowledgeTool.py
      - TableTool.py
      - ConditionalTool.py

  - id: sop-core
    path: services/sop-core
    role: sop_runtime
    depends_on:
      - ai-inference
    key_symbols:
      - sop_parser.py

  - id: geo-core
    path: services/geo-core
    role: geo_runtime
    depends_on: []

flows:
  - id: resource-open
    purpose: Open knowledge, project, and SOP resources through one frontend protocol.
    steps:
      - createResourceNode
      - createOpenResourcePayload
      - useResourceOpen.openResource
      - workbenchStore.openResource
      - Workbench view mapping
    anchors:
      - packages/docs-ui/src/composables/useResourceAdapter.ts
      - apps/web-console/src/composables/useResourceOpen.ts
      - apps/web-console/src/stores/workbench.ts

  - id: docs-runtime
    purpose: Parse one document into storage, index, and frontend-readable outputs.
    steps:
      - register_document
      - ParseOrchestrator.create_parse_task
      - mineru_parser.parse_document
      - result_store_json.save_markdown
      - result_store_json.save_parse_artifacts
      - build_structured_index_for_doc
      - GET /api/knowledge/document/{library_id}/{doc_id}
      - GET /api/knowledge/document/{library_id}/{doc_id}/structured
    anchors:
      - apps/api-server/knowledge_routes.py
      - services/docs-core/src/docs_core/ingest/extract/mineru_parser.py
      - services/docs-core/src/docs_core/ingest/store/assets_file_store.py
      - services/docs-core/src/docs_core/knowledge_service.py

  - id: docs-query-runtime
    purpose: Route one knowledge question through intent classification, retrieval, and LLM generation.
    steps:
      - POST /api/query
      - IntentClassifier.classify_intent (angineer-core, uses ai-inference LLMClient)
      - service_mode dispatch (semantic_retrieval / sql_first)
      - dense + sparse + hybrid retrieval (docs-core, uses ai-inference embedding)
      - text2sql pipeline (docs-core)
      - LLM generation (ai-inference LLMClient directly)
    anchors:
      - apps/api-server/main.py
      - services/ai-inference/src/ai_inference/llm_client.py
      - services/angineer-core/src/angineer_core/classifier.py
      - services/angineer-core/src/angineer_core/dispatcher.py
      - services/docs-core/src/docs_core/retrieval/dense_retriever.py
      - services/docs-core/src/docs_core/retrieval/hybrid_retriever.py
      - services/docs-core/src/docs_core/text2sql/schema_linker.py

storage:
  document_root: data/knowledge_base/libraries/{library_id}/documents/{doc_id}
  databases:
    - data/knowledge_base/knowledge_meta.sqlite
    - data/knowledge_base/knowledge_index.sqlite
  expected_layout:
    - source/
    - parsed/
    - edited/
    - structured/

invariants:
  - web-console and admin-console should share the resource protocol by default.
  - frontend /api proxy must point to http://localhost:8789.
  - api-server is the gateway entry for frontend knowledge access.
  - docs parsing must remain asynchronous when work is long-running.
  - docs storage follows one-document-one-folder.
  - docs-core runtime data uses knowledge_meta.sqlite and knowledge_index.sqlite.
  - ai-inference is the sole AI inference provider with zero reverse dependencies.
  - all services needing LLM/semantic capabilities must import directly from ai_inference, not via angineer-core re-export.

change_checklist:
  - If ports change, update every reference in docs and frontend proxy config in the same change.
  - If resource protocol changes, update adapter, open flow, workbench mapping, and both consoles.
  - If docs storage layout changes, update docs-core, engtools compatibility, docs, and migration path.
  - If knowledge routes change, update README and both techniques documents.
  - If ai-inference API changes, update all direct consumers (angineer-core, docs-core, engtools, sop-core, api-server).
